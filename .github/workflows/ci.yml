name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: نصب Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: نصب وابستگی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e .

      - name: اجرای تست‌ها
        run: |
          pytest -v --tb=short --cov=src/tizpar

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: نصب وابستگی‌ها
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -e .

      - name: اجرای لینتر
        run: |
          ruff check src/tizpar/
