name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: نصب ابزارهای ساختی
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: ساخت پکیج
        run: |
          python -m build

      - name: ایجاد Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
